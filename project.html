<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Project Details - Youness Eddanguir Portfolio">
    <meta name="keywords" content="developer portfolio, project details, web development">
    <meta name="author" content="Youness Eddanguir">
    <meta name="theme-color" content="#0f172a">
    
    <meta property="og:title" content="Project Details - Youness Eddanguir">
    <meta property="og:description" content="View project details">
    <meta property="og:type" content="website">
    
    <link rel="icon" type="image/webp" href="images/mypic.webp">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <title>Project Details - Youness Eddanguir</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
    
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="project-nav">
        <div class="nav-container">
            <a id="back-btn" class="back-btn" href="index.html">
                <i class="fas fa-arrow-left"></i>
            </a>
            <script>
            (function(){
                var params = new URLSearchParams(window.location.search);
                var cat = params.get('category');
                var btn = document.getElementById('back-btn');
                if(btn && cat){
                    if(cat === 'quiz_apps' || cat === 'utility_apps' || cat === 'iot_apps'){
                        btn.href = 'index.html#mobile-apps';
                    }else if(cat === 'smarthome_apps' || cat === 'industrial_iot' || cat === 'sensor_projects' || cat === 'robotics_iot' || cat === 'iot_mobile_apps' || cat === 'ai_iot_systems'){
                        btn.href = 'index.html#iot-projects';
                    }else{
                        btn.href = 'index.html#web-apps';
                    }
                }else if(btn){
                    btn.href = 'index.html#web-apps';
                }
            })();
            </script>
        </div>
    </nav>

    <!-- Main Content - Single Section -->
    <main class="project-main">
        <section class="project-section">
            <div class="project-container">
                <!-- Category Filter Buttons -->
                <div class="category-filters" id="category-filters"></div>
                
                <!-- Project Display -->
                <div class="project-display">
                    <!-- Project Image -->
                    <div class="project-image-container reveal active">
                        <img id="project-image" src="" alt="" class="project-hero-image" onclick="event.stopPropagation(); if(typeof openFullscreenImage==='function'){openFullscreenImage(this.src);}">
                        <div class="image-overlay"></div>
                        <!-- Navigation Arrows -->
                        <button class="project-nav-arrow prev" id="project-prev">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button class="project-nav-arrow next" id="project-next">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                        <!-- Pagination -->
                        <div class="project-pagination">
                            <span class="page-info" id="current-slide">1</span>
                            <span>/</span>
                            <span class="page-total" id="total-slides">1</span>
                        </div>
                    </div>
                    
                    <!-- Project Info -->
                    <div class="project-info reveal delay-1 active">
                        <h1 id="project-title" class="project-title"></h1>
                        <p id="project-description" class="project-description"></p>
                        
                        <div class="project-technologies">
                            <h3>Technologies</h3>
                            <div class="tech-tags" id="project-technologies"></div>
                        </div>
                        
                        <!-- Features -->
                        <div class="project-features">
                            <h3>Key Features</h3>
                            <div class="features-list" id="project-features"></div>
                        </div>
                        
                        <!-- Links -->
                        <div class="project-links" id="project-links"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <!-- Scripts -->
    <script src="js/data/web-projects.js"></script>
    <script src="js/data/mobile-projects.js"></script>
    <script src="js/data/iot-projects.js"></script>
    <script src="js/project.js"></script>
    <script src="js/three-card-carousel.js"></script>

    <!-- Image Fullscreen Viewer -->
    <div id="image-fullscreen" class="fullscreen-image-overlay" onclick="closeFullscreenImage()">
        <button class="fullscreen-close-btn" onclick="closeFullscreenImage()">
            <i class="fas fa-times"></i>
        </button>
        <img id="fullscreen-image" src="" alt="Fullscreen Image">
    </div>

    <script>
    window.openFullscreenImage = function(imageUrl) {
        console.log('Opening fullscreen:', imageUrl);
        const overlay = document.getElementById('image-fullscreen');
        const img = document.getElementById('fullscreen-image');
        if (overlay && img) {
            img.src = imageUrl;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    };

    window.closeFullscreenImage = function() {
        const overlay = document.getElementById('image-fullscreen');
        if (overlay) {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            window.closeFullscreenImage();
        }
    });
    </script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var cat = params.get('category');
        var btn = document.getElementById('back-btn');
        if(btn && cat){
            if(cat === 'quiz_apps' || cat === 'utility_apps' || cat === 'iot_apps'){
                btn.href = 'index.html#mobile-apps';
            }else if(cat === 'smarthome_apps' || cat === 'industrial_iot' || cat === 'sensor_projects' || cat === 'robotics_iot' || cat === 'iot_mobile_apps' || cat === 'ai_iot_systems'){
                btn.href = 'index.html#iot-projects';
            }
        }
    })();
    </script>
</body>
</html>
